<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DharmaNiti Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="header">
            <div class="logo-circle">ॐ</div>
            <div class="logo-text">
                <h1>DharmaNiti</h1>
                <p>Bhagavad Gita & Chanakya Niti Wisdom Bot</p>
            </div>
        </div>

        <div class="chat-container">
            <div id="chat-window"></div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask anything about life, work, mind, relations...">
                <button id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
